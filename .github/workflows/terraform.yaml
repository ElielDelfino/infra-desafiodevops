name: Terraform CI/CD

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Executar o terraform apply?'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']
      destroy:
        description: 'Executar o terraform destroy?'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']
      plan_destroy:
        description: 'Planejar o destroy'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    env:
      TF_VAR_aws_region: ${{ secrets.TF_VAR_AWS_REGION }}
      TF_VAR_vpc_cidr: ${{ secrets.TF_VAR_VPC_CIDR }}
      TF_VAR_azs: ${{ secrets.TF_VAR_AZS }}
      TF_VAR_public_subnets_cidr: ${{ secrets.TF_VAR_PUBLIC_SUBNETS_CIDR }}
      TF_VAR_private_subnets_cidr: ${{ secrets.TF_VAR_PRIVATE_SUBNETS_CIDR }}
      TF_VAR_db_name: ${{ secrets.TF_VAR_DB_NAME }}
      TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_db_instance_type: ${{ secrets.TF_VAR_DB_INSTANCE_TYPE }}
      TF_VAR_db_allocated_storage: ${{ secrets.TF_VAR_DB_ALLOCATED_STORAGE }}
      TF_VAR_ecs_cluster_name: ${{ secrets.TF_VAR_ECS_CLUSTER_NAME }}
      TF_VAR_app_name: ${{ secrets.TF_VAR_APP_NAME }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
      TF_VAR_image_tag: ${{ secrets.TF_VAR_IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.TF_VAR_AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Validate
        if: github.event.inputs.destroy != 'true'
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.destroy != 'true'
        run: terraform plan -out=tfplan.tfout

      - name: Terraform Apply
        if: github.event.inputs.apply == 'true'
        run: terraform apply --auto-approve tfplan.tfout

      - name: Terraform Plan Destroy
        if: github.event.inputs.plan_destroy == 'true'
        run: terraform plan -destroy

      - name: Pre-Destroy - Scale down ECS services and ASG
        if: github.event.inputs.destroy == 'true'
        run: |
          CLUSTER="${{ secrets.TF_VAR_ECS_CLUSTER_NAME }}"
          REGION="${{ secrets.TF_VAR_AWS_REGION }}"

          # 1. Escala ECS services para 0
          SERVICES=$(aws ecs list-services --cluster "$CLUSTER" --region "$REGION" --query 'serviceArns[]' --output text 2>/dev/null || true)
          if [ -n "$SERVICES" ]; then
            for SVC in $SERVICES; do
              aws ecs update-service --cluster "$CLUSTER" --service "$SVC" --desired-count 0 --region "$REGION"
            done
            echo "Aguardando tasks drenarem..."
            for SVC in $SERVICES; do
              aws ecs wait services-stable --cluster "$CLUSTER" --services "$SVC" --region "$REGION" || true
            done
          fi

          # 2. Escala ASG para 0 para terminar as EC2 e liberar ENIs/SGs
          ASG_NAME="${CLUSTER}-asg"
          ASG_EXISTS=$(aws autoscaling describe-auto-scaling-groups --auto-scaling-group-names "$ASG_NAME" --region "$REGION" --query 'AutoScalingGroups[0].AutoScalingGroupName' --output text 2>/dev/null || true)
          if [ "$ASG_EXISTS" != "None" ] && [ -n "$ASG_EXISTS" ]; then
            echo "Escalando ASG $ASG_NAME para 0..."
            aws autoscaling update-auto-scaling-group --auto-scaling-group-name "$ASG_NAME" --min-size 0 --max-size 0 --desired-capacity 0 --region "$REGION"
            echo "Aguardando instâncias terminarem..."
            aws autoscaling wait group-in-service --auto-scaling-group-name "$ASG_NAME" --region "$REGION" || true
            # Aguarda extra para ENIs serem liberadas
            sleep 30
          fi

      - name: Terraform Destroy
        if: github.event.inputs.destroy == 'true'
        run: |
          terraform destroy --auto-approve || {
            echo "Primeira tentativa falhou (possivelmente ENIs do ALB ainda sendo liberadas). Aguardando 60s e tentando novamente..."
            sleep 60
            terraform destroy --auto-approve
          }