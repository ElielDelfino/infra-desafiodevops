name: Terraform CI/CD

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Executar o terraform apply?'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']
      destroy:
        description: 'Executar o terraform destroy?'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']
      plan_destroy:
        description: 'Planejar o destroy'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    env:
      TF_VAR_aws_region: ${{ secrets.TF_VAR_AWS_REGION }}
      TF_VAR_vpc_cidr: ${{ secrets.TF_VAR_VPC_CIDR }}
      TF_VAR_azs: ${{ secrets.TF_VAR_AZS }}
      TF_VAR_public_subnets_cidr: ${{ secrets.TF_VAR_PUBLIC_SUBNETS_CIDR }}
      TF_VAR_private_subnets_cidr: ${{ secrets.TF_VAR_PRIVATE_SUBNETS_CIDR }}
      TF_VAR_db_name: ${{ secrets.TF_VAR_DB_NAME }}
      TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_db_instance_type: ${{ secrets.TF_VAR_DB_INSTANCE_TYPE }}
      TF_VAR_db_allocated_storage: ${{ secrets.TF_VAR_DB_ALLOCATED_STORAGE }}
      TF_VAR_ecs_cluster_name: ${{ secrets.TF_VAR_ECS_CLUSTER_NAME }}
      TF_VAR_app_name: ${{ secrets.TF_VAR_APP_NAME }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}
      TF_VAR_initial_image_tag: ${{ secrets.TF_VAR_INITIAL_IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.TF_VAR_AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2

      - name: Terraform Init
        run: terraform init -upgrade

      - name: Terraform Validate
        if: github.event.inputs.destroy != 'true'
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.destroy != 'true'
        run: terraform plan -out=tfplan.tfout

      - name: Terraform Apply
        if: github.event.inputs.apply == 'true'
        run: terraform apply --auto-approve tfplan.tfout

      - name: Terraform Plan Destroy
        if: github.event.inputs.plan_destroy == 'true'
        run: terraform plan -destroy

      - name: Pre-Destroy
        if: github.event.inputs.destroy == 'true'
        run: |
          CLUSTER="${{ secrets.TF_VAR_ECS_CLUSTER_NAME }}"
          REGION="${{ secrets.TF_VAR_AWS_REGION }}"
          DB_ID="app-postgres"

          # 1. Deleta serviços ECS (força, sem esperar draining)
          SERVICES=$(aws ecs list-services --cluster "$CLUSTER" --region "$REGION" --query 'serviceArns[]' --output text 2>/dev/null || true)
          for SVC in $SERVICES; do
            aws ecs update-service --cluster "$CLUSTER" --service "$SVC" --desired-count 0 --region "$REGION" || true
            aws ecs delete-service --cluster "$CLUSTER" --service "$SVC" --force --region "$REGION" || true
          done

          # 2. Termina instâncias EC2 do ASG
          ASG_NAME="${CLUSTER}-asg"
          aws autoscaling update-auto-scaling-group --auto-scaling-group-name "$ASG_NAME" --min-size 0 --max-size 0 --desired-capacity 0 --region "$REGION" 2>/dev/null || true
          for i in $(seq 1 20); do
            COUNT=$(aws autoscaling describe-auto-scaling-groups --auto-scaling-group-names "$ASG_NAME" --region "$REGION" --query 'AutoScalingGroups[0].Instances | length(@)' --output text 2>/dev/null || echo "0")
            [ "$COUNT" = "0" ] && break
            echo "Aguardando EC2s terminarem... ($COUNT restantes)"
            sleep 15
          done

          # 3. Desregistra container instances
          INSTANCES=$(aws ecs list-container-instances --cluster "$CLUSTER" --region "$REGION" --query 'containerInstanceArns[]' --output text 2>/dev/null || true)
          for CI in $INSTANCES; do
            aws ecs deregister-container-instance --cluster "$CLUSTER" --container-instance "$CI" --force --region "$REGION" || true
          done

          # 4. Deleta RDS e aguarda
          DB_STATUS=$(aws rds describe-db-instances --db-instance-identifier "$DB_ID" --region "$REGION" --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null || echo "not-found")
          if [ "$DB_STATUS" != "not-found" ] && [ "$DB_STATUS" != "None" ]; then
            aws rds delete-db-instance --db-instance-identifier "$DB_ID" --skip-final-snapshot --region "$REGION" || true
            echo "Aguardando RDS ser deletado..."
            aws rds wait db-instance-deleted --db-instance-identifier "$DB_ID" --region "$REGION" || true
          fi

      - name: Terraform Destroy
        if: github.event.inputs.destroy == 'true'
        run: |
          terraform destroy --auto-approve || {
            echo "Primeira tentativa falhou (possivelmente ENIs do ALB ainda sendo liberadas). Aguardando 60s e tentando novamente..."
            sleep 60
            terraform destroy --auto-approve
          }